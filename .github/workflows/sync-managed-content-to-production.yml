name: Validate Managed Content Publish Flow

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'backend/Samantha.API/**'
      - 'tools/ManagedContentPublisher/**'
      - 'tools/sync-managed-content-to-production.mjs'
      - 'docs/managed-content-publishing.md'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/sync-managed-content-to-production.yml'
  workflow_dispatch:

jobs:
  validate-managed-content-flow:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install frontend dependencies
        run: npm ci

      - name: Restore backend dependencies
        run: dotnet restore backend/Samantha.API/Samantha.API.csproj

      - name: Restore managed content publisher dependencies
        run: dotnet restore tools/ManagedContentPublisher/ManagedContentPublisher.csproj

      - name: Build frontend
        run: npm run build

      - name: Build backend
        run: dotnet build backend/Samantha.API/Samantha.API.csproj --configuration Debug --no-restore

      - name: Build managed content publisher
        run: dotnet build tools/ManagedContentPublisher/ManagedContentPublisher.csproj --configuration Debug --no-restore
